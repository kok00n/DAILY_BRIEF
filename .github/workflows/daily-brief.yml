name: Daily Brief

on:
  workflow_dispatch:             # manual "Run workflow" button
    inputs:
      mode:
        description: "Run mode"
        type: choice
        default: collect-only    # safe default: data ingestion only, no paid script gen
        options:
          - collect-only         # Stooq/FRED/Yahoo/CoinGecko + news/social only; no Claude/TTS/publish
          - full                 # produce + publish the episodes (uses Claude + edge-tts + R2)
  schedule:
    # GitHub cron is UTC. 04:30 UTC = 06:30 CEST (summer) / 05:30 CET (winter).
    # Weekdays only (1-5 = Mon-Fri); no weekend runs. Monday still covers the
    # weekend via the app's weekend-lookback logic.
    # Note: GitHub cron is best-effort (can lag 5-30 min) and the pipeline takes
    # ~5-10 min, so the episode is typically READY ~06:40-07:10. If you need it
    # ready BY 06:30, start earlier, e.g. '45 3 * * 1-5' (05:45 CEST).
    - cron: "30 4 * * 1-5"

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build & publish brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CNB_API_KEY: ${{ secrets.CNB_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        # scheduled runs have no inputs -> mode resolves to full; manual runs honour
        # the dropdown (defaults to collect-only so a click can't accidentally bill Claude).
        run: |
          if [ "${{ inputs.mode }}" = "collect-only" ]; then
            echo "MODE: collect-only (data ingestion check; no script/audio/publish)"
            python run_brief.py --collect-only
          else
            echo "MODE: full"
            python run_brief.py
          fi

      - name: Upload script / research / logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-debug-${{ github.run_id }}
          path: |
            output/*.log
            output/research_*.txt
            output/script_*.txt
            output/dossier_*.json
          if-no-files-found: ignore
          retention-days: 7
