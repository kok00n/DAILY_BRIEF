name: Daily Brief

on:
  workflow_dispatch: {}          # manual "Run workflow" button
  schedule:
    # GitHub cron is UTC and best-effort (can lag 5-30 min under load), so we
    # start with a buffer. 03:00 UTC = 05:00 CEST (summer) / 04:00 CET (winter),
    # which leaves plenty of room before ~06:30 Europe/Warsaw.
    # Want fresher data? Push it later (e.g. '30 4' = 06:30 CEST) at slightly
    # higher risk of cron lag eating into the deadline.
    - cron: "0 3 * * *"

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build & publish brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          STOOQ_API_KEY: ${{ secrets.STOOQ_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: python run_brief.py

      - name: Upload script / research / logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-debug-${{ github.run_id }}
          path: |
            output/*.log
            output/research_*.txt
            output/script_*.txt
            output/dossier_*.json
          if-no-files-found: ignore
          retention-days: 7
