    title: "Otwarcie i TL;DR dnia"
    title_en: "Open and daily TL;DR"
    target_min: 2
    feeds: [market, news]
  - id: agenda
    title: "Kalendarz na dziś — co i o której"
    title_en: "Today's calendar — what and when"
    target_min: 3
    feeds: [calendar]
  - id: overnight
    title: "Sesja nocna — co się ruszyło"
    title_en: "Overnight session — what moved"
