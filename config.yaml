# Today's economic agenda (forward-looking).
calendar:
  enabled: true
  # Free structured feed (majors: US/EU/UK/JP/...). Times are converted to your tz.
  faireconomy_url: "https://nfs.faireconomy.media/ff_calendar_thisweek.json"
  # Which impact levels to include from the structured feed (Holiday always kept).
  min_impact: ["High", "Medium"]
  # The FF feed has NO Poland/Czech/Hungary — this Perplexity query fills the CEE
  # gap (NBP/CNB/MNB decisions + local releases) plus today's Fed/ECB speakers.
  cee_supplement: true

# Bund/Schatz + CEE (PL/CZ/HU) 10Y yields — handled by the dedicated cee_yields
# collector, folded into rates_cores (DE) / rates_cee (PL/CZ/HU) in aggregate.py.
# Philosophy: deterministic, DATED values; a daily feed only counts if its latest
# point is plausible AND <=7 days old. A monthly FRED/OECD figure is the ultimate
# fallback AND a plausibility check, flagged "dane miesięczne" — a stale number is
# never presented as today's print. Provider chain per instrument:
#   DE 10Y/2Y : Bundesbank (daily, no key) -> ECB (daily proxy) -> Stooq -> FRED monthly
#   PL 10Y    : Stooq (daily, keyless, stooq.pl) -> validated Perplexity snapshot -> FRED monthly
#   CZ 10Y    : Stooq (daily, keyless) -> CNB ARAD (daily, free CNB_API_KEY)       -> FRED monthly
#   HU 10Y    : Stooq (daily, keyless) -> MNB .xls (monthly, optional)             -> FRED monthly
cee_yields:
  stooq:                       # DISABLED: Stooq's apikey CSV broke ~2026-06-05 (now serves an
    enabled: false             # anti-bot JS challenge even with a valid key — confirmed: the user's
    hosts: ["stooq.pl", "stooq.com"]   # own CETO Stooq feed went stale on the same date). Set true
    symbols: {PL: "10yply.b", CZ: "10yczy.b", HU: "10yhuy.b", DE: "10ydey.b"}  # if Stooq restores CSV.
  bundesbank:                  # the actual German term-structure par yields
    base: "https://api.statistiken.bundesbank.de/rest/data/BBSIS"
    series_10y: "D.I.ZAR.ZI.EUR.S1311.B.A604.R10XX.R.A.A._Z._Z.A"
    series_2y:  "D.I.ZAR.ZI.EUR.S1311.B.A604.R02XX.R.A.A._Z._Z.A"
  ecb_fallback:                # euro-area AAA spot rate — proxy for Bund (a few bp off)
    series_10y: "B.U2.EUR.4F.G_N_A.SV_C_YM.SR_10Y"
    series_2y:  "B.U2.EUR.4F.G_N_A.SV_C_YM.SR_2Y"
  cnb_indicator_10y: "MIRFMSD10DRATPECD"   # ARAD daily 10Y Czech govbond yield
  mnb_xls_url: ""              # optional HU override, e.g.
                               # https://statisztika.mnb.hu/timeseries/en0904_benchmark.xls
  mnb_header_row: 3            # MNB sheet: header row index; 10Y is column 7
  mnb_col_10y: 7
  fred_monthly:                # deterministic monthly anchors (keyless fredgraph.csv)
    PL: "IRLTLT01PLM156N"
    CZ: "IRLTLT01CZM156N"
    HU: "IRLTLT01HUM156N"
    DE: "IRLTLT01DEM156N"
  sanity:                      # plausibility guards (percent / pp)
    min: -2.0
    max: 25.0
    snapshot_max_dev_pp: 1.5   # reject a PL snapshot deviating >1.5pp from the anchor

# Interest-rate SWAP (IRS) curves from BlueGamma's public API (no key, datacenter-OK).
# Deterministic, dated par-swap mids per tenor + computed curve slopes (2s10s, 5s10s…
# in bp, tagged stromienie/spłaszczanie) so the brief can discuss steepeners/flatteners
# and set the swap curve against cash govies. Snapshot ~13:00 (EURIBOR intraday).
swaps:
  enabled: true
  endpoint: "https://2vqt1h8xmd.execute-api.eu-west-2.amazonaws.com/public/get_index_name_all_swap_rates"
  curves:                      # index_name per currency (not the ccy code)
    - {ccy: PLN, index: "6M WIBOR"}
    - {ccy: HUF, index: "6M BUBOR"}
    - {ccy: CZK, index: "6M PRIBOR"}
    - {ccy: EUR, index: "6M EURIBOR"}    # or "ESTR" for the EUR OIS curve (2D–60Y)
  tenors: ["2Y", "5Y", "10Y", "20Y", "30Y"]      # levels to report (missing ones skipped)
  slopes: [["2Y", "10Y"], ["5Y", "10Y"], ["2Y", "5Y"], ["10Y", "30Y"]]   # steepeners/flatteners
  max_stale_days: 7            # skip a curve whose latest stamp is older than this

# Deterministic FX from the ECB Data Portal daily euro reference rates (no key).
# USD crosses are derived and DXY is computed from the basket. ECB values override
# the Yahoo markets.fx below by name (Yahoo stays as the per-pair fallback).
fx:
  enabled: true
  pairs: ["EUR/USD", "USD/PLN", "EUR/PLN", "USD/JPY", "DXY"]

# Market data universe. source: fred | yahoo | coingecko
# Symbols are resilient — a failing symbol is logged and skipped, not fatal.
markets:
  rates_cores:
    - {name: "US 2Y",   source: fred,  id: "DGS2",  unit: "%"}
    - {name: "US 5Y",   source: fred,  id: "DGS5",  unit: "%"}
    - {name: "US 10Y",  source: fred,  id: "DGS10", unit: "%"}
    - {name: "US 30Y",  source: fred,  id: "DGS30", unit: "%"}
    - {name: "UST 2s10s", source: fred, id: "T10Y2Y", unit: "bp"}
    - {name: "UST 10s vs 3M", source: fred, id: "T10Y3M", unit: "bp"}
    - {name: "SOFR",    source: fred,  id: "SOFR",  unit: "%"}
    - {name: "Fed funds (eff.)", source: fred, id: "DFF", unit: "%"}
    - {name: "US 5y breakeven", source: fred, id: "T5YIE", unit: "%"}
    - {name: "US HY OAS", source: fred, id: "BAMLH0A0HYM2", unit: "%"}
    # Bund 10Y + Schatz 2Y are appended here by the cee_yields collector
    # (Bundesbank -> ECB -> FRED monthly) — see the cee_yields block above.
  # CEE 10Y yields (PL/CZ/HU) come from the dedicated cee_yields collector
  # (CNB/snapshot/MNB + FRED monthly anchors), folded into rates_cee in
  # aggregate.py — so this list is intentionally empty.
  rates_cee: []
  fx:
    - {name: "DXY",     source: yahoo, id: "DX-Y.NYB"}
    - {name: "EUR/USD", source: yahoo, id: "EURUSD=X"}
    - {name: "USD/PLN", source: yahoo, id: "PLN=X"}
    - {name: "EUR/PLN", source: yahoo, id: "EURPLN=X"}
    - {name: "USD/JPY", source: yahoo, id: "JPY=X"}
  equities:
    - {name: "S&P 500",   source: yahoo, id: "^GSPC"}
    - {name: "Nasdaq 100",source: yahoo, id: "^NDX"}
    - {name: "Dow",       source: yahoo, id: "^DJI"}
    - {name: "DAX",       source: yahoo, id: "^GDAXI"}
    - {name: "WIG20",     source: yahoo, id: "WIG20.WA"}
    - {name: "WIG",       source: yahoo, id: "WIG.WA"}
    - {name: "VIX",       source: yahoo, id: "^VIX"}
    - {name: "S&P futures",source: yahoo, id: "ES=F"}
  commodities:
    - {name: "WTI",   source: yahoo, id: "CL=F"}
    - {name: "Brent", source: yahoo, id: "BZ=F"}
    - {name: "Gold",  source: yahoo, id: "GC=F"}
    - {name: "Silver",source: yahoo, id: "SI=F"}
    - {name: "NatGas (US)", source: yahoo, id: "NG=F"}
    - {name: "Copper",source: yahoo, id: "HG=F"}
  crypto:
    - {name: "BTC", source: coingecko, id: "bitcoin"}
    - {name: "ETH", source: coingecko, id: "ethereum"}
    - {name: "SOL", source: coingecko, id: "solana"}

publish:
  podcast_title: "Briefing Rynkowy"
