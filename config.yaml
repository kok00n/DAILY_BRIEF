# =====================================================================
# DAILY_BRIEF — configuration
# Edit freely. Secrets live in .env, not here.
# =====================================================================

general:
  timezone: "Europe/Warsaw"
  ready_by: "06:30"            # when the episode should be ready on the phone
  brief_target_minutes: 40     # desired spoken length
  words_per_minute: 145        # Polish narration pace (used for length calibration)
  # On Monday, look back over the whole weekend (since Friday). Otherwise 24h.
  weekend_lookback: true

claude:
  model: "claude-opus-4-8"
  # used only if the primary model stays overloaded after retries (a brief in
  # Sonnet beats no brief). Set to "" to disable the fallback.
  fallback_model: "claude-sonnet-4-6"
  max_tokens: 32000          # ceiling only — you pay for tokens actually generated
  # note: Opus 4.8 does not accept a 'temperature' param, so we don't send one.

perplexity:
  model: "sonar-pro"
  max_tokens_per_query: 1100
  search_recency_filter: "day"  # overridden to "week" automatically on Monday

# News-quality controls for Perplexity (search_domain_filter: max 20 per query,
# allowlist OR denylist — not both).
news:
  # Global denylist — applies to every topic that has NO allowlist below.
  # Keeps forums, social and SEO/content-farms out of the macro/rates queries.
  deny_domains:
    - reddit.com
    - quora.com
    - pinterest.com
    - medium.com
    - fool.com
    - marketbeat.com
    - benzinga.com
    - facebook.com
    - instagram.com
    - tiktok.com
    - msn.com
  # Per-topic ALLOWLISTS (allowlist mode; max 20 each). A topic listed here is
  # restricted to these high-quality sources instead of using the denylist.
  allow_domains:
    cee:                       # global wires + official CBs + top local press
      - reuters.com
      - bloomberg.com
      - ft.com
      - ecb.europa.eu
      - nbp.pl
      - pap.pl
      - bankier.pl
      - parkiet.com
      - pb.pl
      - forsal.pl
      - money.pl
      - rp.pl
      - wnp.pl
      - obserwatorfinansowy.pl
      - notesfrompoland.com
      - cnb.cz
      - mnb.hu
    crypto:                    # quality crypto press + on-chain/data
      - coindesk.com
      - cointelegraph.com
      - theblock.co
      - decrypt.co
      - dlnews.com
      - blockworks.co
      - bloomberg.com
      - reuters.com
      - ft.com
      - glassnode.com
      - kaiko.com
      - coinmetrics.io
    ai_tech:                   # AI/tech press, research and primary lab sources
      - techcrunch.com
      - theverge.com
      - arstechnica.com
      - wired.com
      - venturebeat.com
      - theinformation.com
      - semianalysis.com
      - technologyreview.com
      - arxiv.org
      - huggingface.co
      - anthropic.com
      - openai.com
      - deepmind.google
      - bloomberg.com
      - reuters.com
  # Per-topic recency override (otherwise day, or week on Mondays).
  recency_overrides:
    ai_tech: week

grok:
  model: "grok-4.3"
  max_output_tokens: 4000
  enable_image_understanding: true   # let Grok read charts/tables/screenshots in posts
  enable_video_understanding: false  # slower/costlier; usually not worth it
  dedup_topics_from_priority: true   # exclude priority handles from the all-of-X topic pass
  # FinTwit is TOPIC-LED: Grok searches all of X with a strong bias toward
  # credible/expert/official sources and explicit instruction to ignore anonymous
  # pump accounts and engagement-bait. Topics are grouped — each group runs as its
  # own x_search pass, so the rates cluster gets dedicated depth instead of
  # competing with crypto/equities in one query. Keywords/cashtags sharpen recall.
  topic_groups:
    rates_macro:               # cores: US + euro area
      - "US Treasury yields & curve: 2s10s, 2s30s, $TNX, $TLT, $ZN, term premium, QT, SOFR, bills supply; Fed reaction function, FOMC, dots, Fed speakers"
      - "ECB & euro rates: Bund, BTP-Bund & OAT spreads, ECB speakers, depo path; UK gilts & BoE"
      - "Breaking macro & top-tier data (CPI, NFP, PMIs) with the market reaction and risk sentiment"
    cee:                       # dedicated pass — the user's home market
      - "Poland: NBP / RPP policy & commentary, POLGBs and the Polish curve, CPI & wages, bond auctions/supply, fiscal/budget & politics"
      - "Polish zloty (USD/PLN, EUR/PLN) and CEE FX (CZK, HUF)"
      - "Polish equities: GPW, WIG20 / WIG / mWIG40, and big single names (PKO, Pekao, Santander PL, PZU, PKN Orlen, PGE, KGHM, Allegro, CD Projekt, Dino, LPP); sector, flow & earnings narrative"
      - "Czech CNB and Hungary MNB policy, rates and bonds; regional data"
    cross_asset:
      - "USD & $DXY, EUR/USD, USD/JPY (core G10 FX)"
      - "US equities: $SPX, $NDX, $ES_F, VIX; sector rotation, breadth, positioning; major earnings / guidance"
      - "European equities: DAX, Euro Stoxx 50, CAC 40, FTSE 100; sector & macro themes, major movers"
      - "Commodities — energy: oil ($CL_F, WTI/Brent), natural gas; metals: gold ($GC_F), silver ($SI_F), copper ($HG_F); softs/ags: wheat, corn, soybeans, coffee, sugar"
    crypto:                    # dedicated pass — majors + altcoin narratives + positioning
      - "Bitcoin & Ethereum: $BTC, $ETH price action, spot ETF flows, macro correlation, regulation, key on-chain signals"
      - "Altcoins — what is heating up: trending narratives & sectors (AI agents, memecoins, L1/L2s, DePIN, RWA, DeFi, restaking), capital rotation between sectors, breakout names and notable new launches/listings"
      - "Crypto trading & positioning: perp funding rates, open interest, long/short ratios, leverage & liquidations, CME/perp basis, options skew, sentiment (fear/greed), whale & exchange flows"
    ai_tech:                   # dedicated AI/tech pass on X
      - "AI model & product launches, notable research, funding/M&A, and compute/chips (Nvidia, datacenters, inference)"
      - "Concrete, practical AI use-cases and applications worth knowing — especially for finance, trading and analyst workflows"
  # A 'never-miss' core: a focused second pass restricted to these accounts so
  # their posts are always captured (xAI hard-caps allowed_x_handles at 20).
  # The collector auto-splits this list into batches of <=20 (xAI's hard cap)
  # and runs one x_search per batch, merging the results — so you can list as
  # many must-read accounts as you like here.
  priority_handles:
    # --- central banks (official) ---
    - federalreserve     # Fed
    - ecb                # ECB
    - nbppl              # Narodowy Bank Polski
    - CNB_cz             # Czech National Bank
    - MNB_Hungary        # Magyar Nemzeti Bank
    # --- US rates / Fed watchers ---
    - NickTimiraos       # WSJ — the Fed whisperer
    - biancoresearch     # Jim Bianco — rates / macro
    - Brad_Setser        # Treasury, flows, reserves (CFR)
    - dampedspring       # Andy Constan — rates / liquidity / positioning
    - concodanomics      # money-market plumbing / front-end / liquidity
    - IanShepherdson     # Pantheon Macro — US data / Fed
    - GregDaco           # EY chief economist — US macro
    - SoberLook          # rates / macro curation
    - convertbond        # Larry McDonald (Bear Traps) — rates / credit / risk
    # --- Europe / ECB rates ---
    - fwred              # Frederik Ducrozet (Pictet) — ECB watcher
    - Schuldensuehner    # Holger Zschaepitz — global markets / Europe
    - ReutersJamie       # Jamie McGeever — Reuters macro/rates columnist
    # --- fast headlines / squawk ---
    - DeItaone           # Walter Bloomberg — breaking headlines
    - LiveSquawk         # real-time news wire
    - financialjuice     # real-time news wire
    # --- macro / FX / credit / Bloomberg ---
    - robin_j_brooks     # Robin Brooks (Brookings) — FX / EM / dollar
    - jnordvig           # Jens Nordvig — FX / rates
    - lisaabramowicz1    # Bloomberg — rates / credit
    - JohnAuthers        # Bloomberg Opinion — macro / markets
    - tracyalloway       # Bloomberg Odd Lots
    - LynAldenContact    # macro / liquidity / fiscal
    - C_Barraud          # global macro data & charts aggregator
    - economics          # Bloomberg Economics
    # --- CEE / Poland ---
    - mbank_research     # mBank — PL macro & rates research
    - Pekao_Analizy      # Bank Pekao — PL macro research
    - analizy_pkobp      # PKO BP — PL macro research
    - spotdatapl         # SpotData (Ignacy Morawski) — PL data/macro
    - rafalhirsch        # Rafał Hirsch — PL markets/rates journalist
    - iggnacy            # Ignacy Morawski — PL macro economist (Puls Biznesu)

# Two daily editions from the SAME research: Polish + English. Each runs its own
# script generation (own prompt + language) and its own TTS voice; both episodes
# are published into one feed. Add/remove editions freely.
editions:
  - id: pl
    language: pl
    prompt: system_brief.md
    voice: pl-PL-MarekNeural
    apply_pronunciations: true      # phonetic respelling of EN jargon (PL voice)
    title_prefix: ""
  - id: en
    language: en
    prompt: system_brief_en.md
    voice: en-US-AndrewMultilingualNeural   # natural English Azure voice (free)
    apply_pronunciations: false     # English voice says English natively
    title_prefix: "[EN] "

voice:
  name: "pl-PL-MarekNeural"    # default / fallback voice if an edition omits 'voice'
  rate: "+0%"                  # e.g. "-5%" to slow down, "+8%" to speed up
  pitch: "+0Hz"
  # Audio format from edge-tts: 24kHz mono mp3 @ 48kbps -> ~14 MB for 40 min.
  silence_between_sections_ms: 700
  # Phonetic respellings so the Polish voice approximates English jargon/tickers
  # (edge-tts can't switch language). Left = matched whole-word, case-insensitive;
  # right = how it should sound when read in Polish. Add/trim to taste.
  pronunciations:
